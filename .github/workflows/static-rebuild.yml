name: Rebuild Static Pages

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'Deployment ID from database'
        required: true

concurrency:
  group: static-rebuild
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static pages
        run: pnpm build
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Upload to Yandex Object Storage
        run: |
          # Configure AWS CLI for Yandex Cloud S3
          export AWS_ENDPOINT_URL="https://storage.yandexcloud.net"
          export AWS_DEFAULT_REGION="${{ secrets.YANDEX_STORAGE_REGION }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.YANDEX_STORAGE_ACCESS_KEY }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.YANDEX_STORAGE_SECRET_KEY }}"

          BUCKET="${{ secrets.YANDEX_STORAGE_BUCKET }}"

          # Upload static assets with long cache (1 year, immutable)
          aws s3 sync dist/client/ "s3://$BUCKET/" \
            --endpoint-url https://storage.yandexcloud.net \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE \
            --only-show-errors

          # Upload HTML files with short cache (1 hour)
          aws s3 sync dist/client/ "s3://$BUCKET/" \
            --endpoint-url https://storage.yandexcloud.net \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=3600" \
            --content-type "text/html; charset=utf-8" \
            --metadata-directive REPLACE \
            --only-show-errors

      - name: Mark deployment as completed
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DEPLOY_CALLBACK_URL }}/api/admin/deploy/complete" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_id\": \"${{ inputs.deployment_id }}\", \"status\": \"completed\"}"

      - name: Mark deployment as failed
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DEPLOY_CALLBACK_URL }}/api/admin/deploy/complete" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_id\": \"${{ inputs.deployment_id }}\", \"status\": \"failed\"}"
